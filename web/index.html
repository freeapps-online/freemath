<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#000000" id="theme-color" />
    <meta name="darkreader-lock" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <script>
      try {
        var s = JSON.parse(localStorage.getItem('freemath-settings') || '{}');
        var theme = s.theme || 'dark';
        var language = s.language && s.language !== 'system' ? s.language : (navigator.languages && navigator.languages[0]) || navigator.language || 'en-US';
        document.documentElement.lang = language;
        if (theme === 'system') theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        if (theme === 'dark') {
          document.documentElement.dataset.theme = 'dark';
          document.getElementById('theme-color').content = '#000000';
        }
      } catch(e) {}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>FreeMathApp</title>
    <meta name="description" content="FreeMathApp — free math practice with adaptive difficulty, streaks, and progress tracking." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js')</script>
  </body>
</html>
